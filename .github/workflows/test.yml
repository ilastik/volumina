name: test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-w-ilastik-env:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0
      - uses: conda-incubator/setup-miniconda@v4
        with:
          activate-environment: ilastik-env
          auto-activate: true
          auto-update-conda: true
          environment-file: .github/workflows/etc/ilastik-env.yaml
          miniforge-version: latest
          conda-remove-defaults: true
      - name: linux test
        if: matrix.os == 'ubuntu-latest'
        shell: bash -l {0}
        run: |
          pip install -e .
          xvfb-run --server-args="-screen 0 1024x768x24" pytest --cov-report=xml --cov=volumina
      - name: osx test
        if: matrix.os == 'macos-10.15'
        shell: bash -l {0}
        run: |
          pip install -e .
          pytest
      - name: windows test
        if: matrix.os == 'windows-latest'
        shell: cmd /C CALL {0}
        # auto activation of env does not seem to work on win
        run: >-
          pip install -e . && pytest
      - uses: codecov/codecov-action@v5
        if: matrix.os == 'ubuntu-latest'
        with:
          files: ./coverage.xml
          fail_ci_if_error: true # optional (default = false)
          verbose: true # optional (default = false)
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test-w-conda-recipe:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        python_version: ["3.10", "3.11", "3.12", "3.13"]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: conda-incubator/setup-miniconda@v4
        with:
          activate-environment: ""
          auto-activate: true
          auto-update-conda: true
          miniforge-version: latest
          conda-remove-defaults: true
          conda-build-version: "*"
      - name: install build dependencies (win)
        if: matrix.os == 'windows-latest'
        shell: cmd /C CALL {0}
        run: conda install -c conda-forge setuptools_scm
      - name: install build dependencies (macos, ubuntu)
        if: matrix.os != 'windows-latest'
        shell: bash -el {0}
        run: conda install -c conda-forge setuptools_scm
      - name: linux conda build test
        if: matrix.os == 'ubuntu-latest'
        shell: bash -el {0}
        run: xvfb-run --server-args="-screen 0 1024x768x24" conda build --python=${{ matrix.python_version }} -c conda-forge conda-recipe
      - name: osx test
        if: startsWith(matrix.os, 'macos')
        shell: bash -el {0}
        run: conda build -c conda-forge --python=${{ matrix.python_version }} conda-recipe
      - name: windows conda-build
        if: matrix.os == 'windows-latest'
        shell: cmd /C CALL {0}
        run: conda build -c conda-forge --python=${{ matrix.python_version }} conda-recipe
